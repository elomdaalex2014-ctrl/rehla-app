name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Create www folder
        run: |
          mkdir -p www
          echo "<html><body></body></html>" > www/index.html

      - name: Add Android platform
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Copy app icons
        run: |
          sudo apt-get install -y imagemagick
          IC=android/app/src/main/res
          mkdir -p $IC/mipmap-mdpi $IC/mipmap-hdpi $IC/mipmap-xhdpi $IC/mipmap-xxhdpi $IC/mipmap-xxxhdpi
          convert icon-192.png -resize 48x48   $IC/mipmap-mdpi/ic_launcher.png
          convert icon-192.png -resize 48x48   $IC/mipmap-mdpi/ic_launcher_round.png
          convert icon-192.png -resize 72x72   $IC/mipmap-hdpi/ic_launcher.png
          convert icon-192.png -resize 72x72   $IC/mipmap-hdpi/ic_launcher_round.png
          convert icon-192.png -resize 96x96   $IC/mipmap-xhdpi/ic_launcher.png
          convert icon-192.png -resize 96x96   $IC/mipmap-xhdpi/ic_launcher_round.png
          convert icon-192.png -resize 144x144 $IC/mipmap-xxhdpi/ic_launcher.png
          convert icon-192.png -resize 144x144 $IC/mipmap-xxhdpi/ic_launcher_round.png
          convert icon-192.png -resize 192x192 $IC/mipmap-xxxhdpi/ic_launcher.png
          convert icon-192.png -resize 192x192 $IC/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rehla-tahwol
          path: android/app/build/outputs/apk/debug/app-debug.apk
